<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>เกมมิติสัมพันธ์ รูปทรงเรขาคณิต</title>

<style>
body{
    margin:0;
    font-family:tahoma;
    background:#eef3f8;
    overflow:auto;
    min-height:1200px;
}

#ui{
    position:absolute;
    top:10px;
    width:100%;
    text-align:center;
    z-index:20;
}

#scene3d{
    position:absolute;
    top:250px;
    left:50%;
    transform:translateX(-50%);
    width:480px;
    height:480px;
}

#board{
    position:absolute;
    top:600px;
    width:100%;
    display:grid;
    grid-template-columns:repeat(3,220px);
    justify-content:center;
    gap:20px;
}

.option{
    width:220px;
    height:220px;
    border:2px solid #444;
    border-radius:10px;
    background:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="ui">

<h2>🧠 เกมมิติสัมพันธ์</h2>

<p>
📊 คะแนน: <span id="score">0</span> |
📌 ข้อ: <span id="qnum">0</span>/10
</p>

ชื่อ-สกุล <input id="studentName"><br><br>

<p id="question">กดเริ่มเกม</p>

<button onclick="startGame()">เริ่มเกม</button>

</div>

<canvas id="scene3d" width="480" height="480"></canvas>

<div id="board">
    <canvas id="a" class="option" width="220" height="220"></canvas>
    <canvas id="b" class="option" width="220" height="220"></canvas>
    <canvas id="c" class="option" width="220" height="220"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// ================= MAIN SCENE =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xeef3f8);

const mainCam = new THREE.PerspectiveCamera(75,1,0.1,1000);
mainCam.position.set(6,6,6);
mainCam.lookAt(0,0,0);

const mainRenderer = new THREE.WebGLRenderer({
    canvas:document.getElementById("scene3d"),
    antialias:true
});
mainRenderer.setSize(480,480);

scene.add(new THREE.AmbientLight(0xffffff,1));

let model = new THREE.Group();
scene.add(model);

// ================= BLOCK =================
function block(x,y,z){
    const geo = new THREE.BoxGeometry(1,1,1);
    const mat = new THREE.MeshBasicMaterial({color:0x888888});
    const cube = new THREE.Mesh(geo,mat);

    cube.position.set(x,y,z);

    const edges = new THREE.EdgesGeometry(geo);
    cube.add(new THREE.LineSegments(edges,new THREE.LineBasicMaterial({color:0x000})));

    model.add(cube);
}

// ================= SHAPES =================
const shapes=[
[
{x:0,y:0,z:0},
{x:1,y:0,z:-1},
{x:2,y:0,z:-2},
{x:2,y:1,z:-1},
{x:2,y:2,z:0}
],
[
{x:0,y:0,z:0},
{x:1,y:0,z:0},
{x:2,y:0,z:-1},
{x:2,y:1,z:-2},
{x:2,y:2,z:-2}
],
[
{x:0,y:0,z:0},
{x:0,y:1,z:0},
{x:1,y:1,z:-1},
{x:2,y:1,z:-2},
{x:2,y:2,z:-1}
]
];

let lastShape=-1;

// ================= BUILD SHAPE =================
function buildRandomShape(){

    model.clear();

    let index;
    do{
        index=Math.floor(Math.random()*shapes.length);
    }while(index===lastShape);

    lastShape=index;

    shapes[index].forEach(p=>{
        block(p.x,p.y,p.z);
    });

    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    model.position.set(-center.x,-center.y,-center.z);
}

// ================= VIEW CAMS =================
function makeCam(){
    const cam = new THREE.OrthographicCamera(-3,3,3,-3,0.1,100);
    return {cam};
}

const views={
    บน:makeCam(),
    หน้า:makeCam(),
    ข้าง:makeCam()
};

views.หน้า.cam.position.set(0,0,10);
views.บน.cam.position.set(0,10,0);
views.บน.cam.up.set(0,0,-1);
views.ข้าง.cam.position.set(10,0,0);

// ================= SINGLE RENDERER (FIX สำคัญ) =================
const optionRenderer = new THREE.WebGLRenderer({alpha:true,antialias:true});
optionRenderer.setSize(220,220);

// ================= GAME =================
let correct="";
let score=0;
let q=0;

const keys=["บน","หน้า","ข้าง"];
let answerMap={};

// ================= QUESTION =================
function newQuestion(){

    buildRandomShape();

    correct = keys[Math.floor(Math.random()*keys.length)];

    document.getElementById("question").innerHTML =
    "ข้อใดคือรูปด้าน : <b>"+correct+"</b>";

    drawOptions();
}

// ================= DRAW OPTIONS =================
function drawOptions(){

    let list=[...keys].sort(()=>Math.random()-0.5);

    answerMap={
        a:list[0],
        b:list[1],
        c:list[2]
    };

    renderOption("a", views[list[0]].cam);
    renderOption("b", views[list[1]].cam);
    renderOption("c", views[list[2]].cam);
}

// ================= RENDER OPTION =================
function renderOption(id, cam){

    const canvas = document.getElementById(id);

    optionRenderer.render(scene, cam);

    const ctx = canvas.getContext("2d");
    ctx.clearRect(0,0,220,220);

    ctx.drawImage(optionRenderer.domElement,0,0,220,220);
}

// ================= CLICK =================
document.getElementById("a").onclick=()=>check("a");
document.getElementById("b").onclick=()=>check("b");
document.getElementById("c").onclick=()=>check("c");

// ================= CHECK =================
function check(ans){

    const msg=document.getElementById("question");

    if(answerMap[ans]===correct){
        score++;
        msg.innerHTML="✅ ถูกต้อง";
    }else{
        msg.innerHTML="❌ ผิด";
    }

    document.getElementById("score").innerText=score;

    q++;
    document.getElementById("qnum").innerText=q;

    if(q>=10){
        alert("จบเกม คะแนน "+score+"/10");
        return;
    }

    setTimeout(newQuestion,500);
}

// ================= START =================
function startGame(){
    score=0;
    q=0;

    document.getElementById("score").innerText=0;
    document.getElementById("qnum").innerText=0;

    newQuestion();
}

// ================= LOOP =================
function animate(){
    requestAnimationFrame(animate);
    mainRenderer.render(scene,mainCam);
}
animate();

</script>

</body>
</html>
