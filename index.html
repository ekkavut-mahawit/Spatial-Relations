<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>เกมมิติสัมพันธ์ รูปทรงเรขาคณิต</title>

<style>
body{
    margin:0;
    font-family:tahoma;
    background:#eef3f8;
    overflow:auto;
    min-height:1200px;
}

#ui{
    position:absolute;
    top:10px;
    width:100%;
    text-align:center;
    z-index:20;
    line-height:1.4;
}

#scene3d{
    position:absolute;
    top:250px;
    left:50%;
    transform:translateX(-50%);
    width:480px;
    height:480px;
    border:none;
    z-index:5;
}

#board{
    position:absolute;
    top:600px;
    width:100%;
    display:grid;
    grid-template-columns:repeat(3,220px);
    justify-content:center;
    gap:20px;
    z-index:20;
}

.option{
    width:220px;
    height:220px;
    border:2px solid #444;
    border-radius:10px;
    background:white;
    cursor:pointer;
    box-shadow:0 3px 8px rgba(0,0,0,.2);
    transition:.2s;
}

.option:hover{
    transform:scale(1.05);
}

canvas{ display:block; }

#question{
    margin-top:10px;
    font-size:18px;
    font-weight:bold;
    color:#222;
}
</style>
</head>

<body>

<div id="ui">
    <h2>🧠 เกมมิติสัมพันธ์ รูปทรงเรขาคณิต</h2>

    <div style="font-size:16px;color:#333;line-height:1.6;margin-bottom:10px;">
        <b>ผู้พัฒนา :</b> นางสาววรรณา อุ่นคำ<br>
        กลุ่มสาระการเรียนรู้คณิตศาสตร์<br>
        โรงเรียนมหาชนะชัยวิทยาคม
    </div>

    <p>
        📊 คะแนน: <span id="score">0</span> |
        📌 ข้อ: <span id="qnum">0</span>/10
    </p>

    ชื่อ-สกุล
    <input id="studentName">

    เลขที่
    <input id="studentNo" style="width:60px">

    ชั้น
    <input id="studentClass" style="width:60px">

    ห้อง
    <input id="studentRoom" style="width:60px">

    <br><br>

    <p id="question">กดเริ่มเกม</p>

    <br>
    <button onclick="startGame()">เริ่มเกม</button>
</div>

<!-- MAIN VIEW -->
<canvas id="scene3d" width="480" height="480"></canvas>

<!-- OPTIONS -->
<div id="board">
    <canvas id="a" class="option" width="220" height="220"></canvas>
    <canvas id="b" class="option" width="220" height="220"></canvas>
    <canvas id="c" class="option" width="220" height="220"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
// ================= SCENE =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xeef3f8);

const mainCam = new THREE.PerspectiveCamera(75,1,0.1,1000);
mainCam.position.set(6,6,6);
mainCam.lookAt(0,0,0);

const renderer = new THREE.WebGLRenderer({
    canvas:document.getElementById("scene3d"),
    antialias:true
});
renderer.setSize(480,480);

scene.add(new THREE.AmbientLight(0xffffff,1));

let model = new THREE.Group();
scene.add(model);

// ================= BLOCK =================
function block(x,y,z){

    const geo = new THREE.BoxGeometry(1,1,1);
    const mat = new THREE.MeshBasicMaterial({color:0x888888});

    const cube = new THREE.Mesh(geo,mat);
    cube.position.set(x,y,z);

    const edges = new THREE.EdgesGeometry(geo);
    cube.add(new THREE.LineSegments(edges,new THREE.LineBasicMaterial({color:0x000})));

    model.add(cube);
}

// ================= SHAPES =================
const shapes=[

[
{x:0,y:0,z:0},
{x:1,y:0,z:-1},
{x:2,y:0,z:-2},
{x:2,y:1,z:-1},
{x:2,y:2,z:0}
],

[
{x:0,y:0,z:0},
{x:1,y:0,z:0},
{x:2,y:0,z:-1},
{x:2,y:1,z:-2},
{x:2,y:2,z:-2}
],

[
{x:0,y:0,z:0},
{x:0,y:1,z:0},
{x:1,y:1,z:-1},
{x:2,y:1,z:-2},
{x:2,y:2,z:-1}
],

[
{x:0,y:0,z:0},
{x:0,y:1,z:-1},
{x:1,y:1,z:-1},
{x:2,y:1,z:-2},
{x:2,y:2,z:-2}
],

[
{x:1,y:0,z:0},
{x:0,y:1,z:-1},
{x:1,y:1,z:-1},
{x:2,y:1,z:-2},
{x:1,y:2,z:-2}
],

[
{x:0,y:0,z:0},
{x:0,y:1,z:-1},
{x:1,y:1,z:-1},
{x:1,y:2,z:-2},
{x:2,y:2,z:-2}
],

[
{x:0,y:0,z:0},
{x:1,y:0,z:0},
{x:2,y:0,z:-1},
{x:0,y:1,z:-1},
{x:2,y:1,z:-2}
]

];

let currentShape=[];
let lastShape=-1;

function buildRandomShape(){

    model.clear();

    let index;
    do{
        index=Math.floor(Math.random()*shapes.length);
    }while(index===lastShape);

    lastShape=index;
    currentShape=shapes[index];

    currentShape.forEach(c=>{
        block(c.x,c.y,c.z);
    });

    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());

    model.position.set(-center.x,-center.y,-center.z);
}

// ================= CAM VIEWS =================
function makeCam(){

    const size = 3;

    const cam = new THREE.OrthographicCamera(
        -size,size,size,-size,0.1,100
    );

    const ren = new THREE.WebGLRenderer({
        antialias:true,
        alpha:true
    });

    ren.setSize(220,220);
    ren.setClearColor(0xffffff,0);

    return {cam,ren};
}

const views={
    บน:makeCam(),
    หน้า:makeCam(),
    ข้าง:makeCam()
};

views.หน้า.cam.position.set(0,0,10);
views.บน.cam.position.set(0,10,0);
views.บน.cam.up.set(0,0,-1);
views.ข้าง.cam.position.set(10,0,0);

// ================= GAME =================
let correct="";
let score=0;
let q=0;

const keys=["บน","หน้า","ข้าง"];
let answerMap={};

function newQuestion(){

    buildRandomShape();

    correct = keys[Math.floor(Math.random()*keys.length)];

    document.getElementById("question").innerHTML =
    "ข้อใดคือรูปด้าน : <b>" + correct + "</b>";

    drawOptions();
}

function drawOptions(){

    let list=[...keys].sort(()=>Math.random()-0.5);

    answerMap={
        a:list[0],
        b:list[1],
        c:list[2]
    };

    render(document.getElementById("a"), views[list[0]]);
render(document.getElementById("b"), views[list[1]]);
render(document.getElementById("c"), views[list[2]]);
}

function render(canvas,obj){

    obj.ren.render(scene,obj.cam);

    const ctx=canvas.getContext("2d");
    ctx.clearRect(0,0,220,220);

    ctx.drawImage(obj.ren.domElement,0,0,220,220);
}

// ================= CLICK =================
a.onclick=()=>check("a");
b.onclick=()=>check("b");
c.onclick=()=>check("c");

function check(ans){

    const msg=document.getElementById("question");

    if(answerMap[ans]===correct){
        score++;
        msg.innerHTML="✅ ตอบถูก";
    }else{
        msg.innerHTML="❌ ตอบผิด";
    }

    document.getElementById("score").innerText=score;

    q++;
    document.getElementById("qnum").innerText=q;

    if(q>=10){
        setTimeout(()=>{
            alert("จบเกม คะแนน: "+score+"/10");
        },500);
        return;
    }

    setTimeout(newQuestion,600);
}

// ================= START =================
function startGame(){

    score=0;
    q=0;

    document.getElementById("score").innerText=0;
    document.getElementById("qnum").innerText=0;

    newQuestion();
}

// ================= LOOP =================
function animate(){
    requestAnimationFrame(animate);
    renderer.render(scene,mainCam);
}
animate();

</script>

</body>
</html>
